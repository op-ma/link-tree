<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link Aplikasi Madrasah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981; /* Hijau Mint */
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --category-bg: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--card-bg);
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding-bottom: 30px;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--card-bg);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            width: 48px;
            height: 48px;
            background-color: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-right: 15px;
        }

        .title-area h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .title-area p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* SEARCH BAR */
        .search-container {
            padding: 15px 20px 5px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 2px solid var(--primary);
            border-radius: 25px;
            padding: 10px 20px;
        }

        .search-box i {
            color: var(--primary);
            margin-right: 10px;
        }

        .search-box input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 15px;
        }

        /* FILTER PILLS */
        .filter-container {
            display: flex;
            overflow-x: auto;
            padding: 15px 20px;
            gap: 10px;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border-color);
        }
        
        .filter-container::-webkit-scrollbar { display: none; }

        .pill {
            padding: 8px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* CONTENT LIST */
        .content-area {
            padding: 20px;
        }
        
        .main-category-label {
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none; /* Disembunyikan default, dimunculkan via JS jika perlu */
        }

        .category-section {
            background: var(--category-bg);
            border-radius: 12px;
            margin-bottom: 20px;
            padding: 15px;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .category-title {
            font-weight: 700;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .link-count {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
        }

        /* LINK CARDS */
        .link-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            text-decoration: none;
            color: var(--text-main);
        }

        .link-card:last-child { margin-bottom: 0; }

        .link-number {
            width: 28px;
            height: 28px;
            background: #e0e7ff; /* Soft blue/purple */
            color: #4f46e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .link-name {
            flex-grow: 1;
            font-size: 14px;
            font-weight: 500;
        }

        .link-actions {
            display: flex;
            gap: 15px;
            color: #94a3b8;
        }

        .link-actions i {
            cursor: pointer;
            transition: color 0.2s;
        }

        .link-actions a:hover i, 
        .link-actions i:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo"><i class="fa-solid fa-building-columns"></i></div>
        <div class="title-area">
            <h1>Link Aplikasi Madrasah</h1>
            <p><span id="total-links">0</span> link tersedia</p>
        </div>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Cari aplikasi...">
        </div>
    </div>

    <div class="filter-container" id="filterContainer">
        </div>

    <div class="content-area" id="contentArea">
        </div>
</div>

<script>
    // ==========================================
    // DATA LINK DENGAN STRUKTUR BARU
    // ==========================================
    const dataAplikasi = [
        {
            id: "madrasah",
            title: "MADRASAH",
            icon: "fa-building-columns",
            subCategories: [
                {
                    title: "EMIS",
                    icon: "fa-house-chimney",
                    links: [
                        { name: "EMIS 4.0", url: "https://emis.kemenag.go.id" },
                        { name: "SIMPATIKA USER", url: "https://paspor.siap-online.com/cas/login?&service=https://padamu.siap.web.id/login" },
                        { name: "SIMPATIKA ADMIN", url: "https://paspor.siap-online.com/cas/login?&service=https://simpadamu.siap.web.id/" },
                        { name: "Login PTK", url: "#" },
                        { name: "EMIS GTK (New)", url: "#" }
                    ]
                },
                {
                    title: "VERVAL",
                    icon: "fa-square-check",
                    links: [
                        { name: "SDM Pusdatin", url: "https://sdm.data.kemdikbud.go.id" },
                        { name: "PD Data", url: "https://pd.data.kemdikbud.go.id" }
                        
                    ]
                },
                {
                    title: "UJIAN",
                    icon: "fa-pen-to-square",
                    links: [
                        { name: "PDUM", url: "https://pdum.kemenag.go.id" },
                        { name: "ANBK", url: "https://anbk.kemdikbud.go.id" }
                    ]
                }
            ]
        },
        {

            title: "PESANTREN",
                    icon: "fa-pen-to-square",
                    links: [
                        { name: "No Surat MTs & MA", url: "https://script.google.com/macros/s/AKfycby05v7IWedC4y2dwzgbX5_blvDUMKy8jJYFWKVWISihfQdXuJZ3nQtBfO9WP-PmagGP/exec" },
                        { name: "MAQIIS", url: "https://v2.maqiis.com/" }
                    ]
                }
            ]
        },
        {
            id: "siswa",
            title: "SISWA",
            icon: "fa-user-graduate",
            subCategories: [
                {
                    title: "LAYANAN SISWA",
                    icon: "fa-users",
                    links: [
                        { name: "Cek NISN", url: "https://nisn.data.kemdikbud.go.id" },
                        { name: "Validasi Data Siswa Kelas 12", url: "https://script.google.com/macros/s/AKfycbzZf5Av2MtUYdRjaohDeagbIL9v-z_nBs6Hr_M8zIyd2RRxBzr1g4rCd9IwuFRSbQ9e/exec" },
                        { name: "Permohonan Berkas", url: "https://script.google.com/macros/s/AKfycbxtFV_ad8xsA85-m6h8W6Jwm3Tw61-9srD8CvPHn72d0nXbLms9IXHNnMxY3GB1Wv23/exec" },
                        { name: "SKL Sementara", url: "https://script.google.com/macros/s/AKfycbzgtuzQEj-btiA3CVqssmNBSwzYyCXEjuIAtgRRA7mVCi08LAmJMQCBCveBy3lhbUyl/exec" },
                        { name: "Portal Permohonan Surat", url: "https://script.google.com/macros/s/AKfycbwLxo5CNl17ft0lav0fhSQavY8d4Gp9hu2CXuO5yhSYYy6XGeLFTK_dkr7U6gRqB_ox/exec" }
                    ]
                }
            ]
        },
        {
            id: "guru",
            title: "GURU",
            icon: "fa-chalkboard-user",
            subCategories: [
                {
                    title: "LAYANAN GURU",
                    icon: "fa-briefcase",
                    links: [
                        { name: "Rekap Nilai ATPM", url: "https://op-ma.github.io/rekap-atpm/" },
                        { name: "Rekap Nilai Semester", url: "https://script.google.com/macros/s/AKfycbxXf4Wz_-pP2w7eRCvSs8b6e6i-HT4DkR7OLQuCHsLt695txPVyOFpMHZEnSnNS5TXt/exec" },
                        { name: "Aplikasi Rapor Ma'had 4.0", url: "https://op-ma.github.io/rapor-mahad/" },
                        { name: "Aplikasi RDM MA", url: "https://ma.almatuq.my.id/" },
                        { name: "EMIS GTK", url: "https://paspor.siap-online.com/cas/login?&service=https://padamu.siap.web.id/login" }
                    ]
                }
            ]
        }
    ];

    // ==========================================
    // SISTEM APLIKASI
    // ==========================================
    let currentFilter = 'semua';
    let searchQuery = '';

    function init() {
        renderFilters();
        renderContent();
        updateTotalLinks();
    }

    // Menghitung total seluruh link dari semua sub-kategori
    function updateTotalLinks() {
        let total = 0;
        dataAplikasi.forEach(mainCat => {
            mainCat.subCategories.forEach(subCat => {
                total += subCat.links.length;
            });
        });
        document.getElementById('total-links').innerText = total;
    }

    // Render Tombol Kategori Utama (Pills)
    function renderFilters() {
        const container = document.getElementById('filterContainer');
        container.innerHTML = `<div class="pill ${currentFilter === 'semua' ? 'active' : ''}" onclick="setFilter('semua')">Semua</div>`;
        
        dataAplikasi.forEach(mainCat => {
            container.innerHTML += `
                <div class="pill ${currentFilter === mainCat.id ? 'active' : ''}" onclick="setFilter('${mainCat.id}')">
                    <i class="fa-solid ${mainCat.icon}"></i> ${mainCat.title}
                </div>
            `;
        });
    }

    function setFilter(id) {
        currentFilter = id;
        renderFilters();
        renderContent();
    }

    // Render Daftar Link bersarakan Sub-Kategori
    function renderContent() {
        const container = document.getElementById('contentArea');
        container.innerHTML = '';

        let filteredData = dataAplikasi;

        // Filter Kategori Utama (Madrasah / Siswa / Guru)
        if (currentFilter !== 'semua') {
            filteredData = filteredData.filter(cat => cat.id === currentFilter);
        }

        filteredData.forEach((mainCat) => {
            // Tampilkan Label Kategori Utama jika sedang di mode "Semua"
            if(currentFilter === 'semua') {
                container.innerHTML += `<div class="main-category-label" style="display:block;">${mainCat.title}</div>`;
            }

            mainCat.subCategories.forEach((subCat) => {
                // Filter Pencarian
                const filteredLinks = subCat.links.filter(link => 
                    link.name.toLowerCase().includes(searchQuery.toLowerCase())
                );

                // Tampilkan kategori jika ada link yang sesuai pencarian
                if (filteredLinks.length > 0) {
                    let html = `
                        <div class="category-section">
                            <div class="category-header">
                                <div class="category-title">
                                    <i class="fa-solid ${subCat.icon}" style="color: #d97706;"></i> ${subCat.title}
                                </div>
                                <div class="link-count">${filteredLinks.length} links</div>
                            </div>
                    `;

                    filteredLinks.forEach((link, linkIndex) => {
                        html += `
                            <div class="link-card">
                                <div class="link-number">${linkIndex + 1}</div>
                                <div class="link-name">${link.name}</div>
                                
                                <div class="link-actions">
                                    <a href="${link.url}" target="_blank" style="color: inherit;" title="Buka Link">
                                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                                    </a>
                                    <i class="fa-regular fa-copy" onclick="copyToClipboard('${link.url}')" title="Copy Link"></i>
                                </div>
                            </div>
                        `;
                    });

                    html += `</div>`;
                    container.innerHTML += html;
                }
            });
        });
    }

    // Event Pencarian
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderContent();
    });

    // Fitur Copy Link
    function copyToClipboard(text) {
        if(text === "#" || text === "") {
            alert("Link belum tersedia.");
            return;
        }
        navigator.clipboard.writeText(text).then(() => {
            alert('Link berhasil di-copy!');
        }).catch(err => {
            console.error('Gagal copy link: ', err);
        });
    }

    // Jalankan aplikasi
    init();

</script>
</body>
</html>
