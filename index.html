<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link Aplikasi Madrasah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981; /* Hijau Mint */
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --category-bg: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 80px; /* Space for admin button */
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--card-bg);
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--card-bg);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            width: 48px;
            height: 48px;
            background-color: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-right: 15px;
        }

        .title-area h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .title-area p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* SEARCH BAR */
        .search-container {
            padding: 15px 20px 5px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 2px solid var(--primary);
            border-radius: 25px;
            padding: 10px 20px;
        }

        .search-box i {
            color: var(--primary);
            margin-right: 10px;
        }

        .search-box input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 15px;
        }

        /* FILTER PILLS */
        .filter-container {
            display: flex;
            overflow-x: auto;
            padding: 15px 20px;
            gap: 10px;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border-color);
        }
        
        .filter-container::-webkit-scrollbar { display: none; }

        .pill {
            padding: 8px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* CONTENT LIST */
        .content-area {
            padding: 20px;
        }

        .category-section {
            background: var(--category-bg);
            border-radius: 12px;
            margin-bottom: 20px;
            padding: 15px;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .category-title {
            font-weight: 700;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .link-count {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
        }

        /* LINK CARDS */
        .link-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            text-decoration: none;
            color: var(--text-main);
        }

        .link-card:last-child { margin-bottom: 0; }

        .link-number {
            width: 28px;
            height: 28px;
            background: #e0e7ff; /* Soft blue/purple */
            color: #4f46e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .link-name {
            flex-grow: 1;
            font-size: 14px;
            font-weight: 500;
        }

        .link-actions {
            display: flex;
            gap: 15px;
            color: #94a3b8;
        }

        .link-actions i {
            cursor: pointer;
            transition: color 0.2s;
        }

        .link-actions i:hover { color: var(--primary); }

        /* ADMIN BUTTON & MODE */
        .admin-fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #334155;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
            border: none;
        }

        .edit-mode-active .admin-fab {
            background: #ef4444; /* Merah untuk mode edit */
        }

        .edit-controls {
            display: none;
        }

        .edit-mode-active .edit-controls {
            display: flex;
            gap: 10px;
        }

        .edit-mode-active .normal-controls {
            display: none;
        }

        .btn-add-link {
            display: none;
            width: 100%;
            padding: 10px;
            background: #e2e8f0;
            border: 2px dashed #94a3b8;
            border-radius: 8px;
            color: #475569;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }

        .edit-mode-active .btn-add-link {
            display: block;
        }

        /* EXPORT MODAL */
        #exportModal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
        }
        .modal-content textarea {
            width: 100%;
            height: 200px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
        }
        .btn-group { display: flex; gap: 10px; justify-content: flex-end;}
        .btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600;}
        .btn-primary { background: var(--primary); color: white;}
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo"><i class="fa-solid fa-building-columns"></i></div>
        <div class="title-area">
            <h1>Link Aplikasi Madrasah</h1>
            <p><span id="total-links">0</span> link tersedia</p>
        </div>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Cari aplikasi...">
        </div>
    </div>

    <div class="filter-container" id="filterContainer">
        </div>

    <div class="content-area" id="contentArea">
        </div>
</div>

<button class="admin-fab" id="adminBtn" onclick="toggleEditMode()" title="Mode Edit">
    <i class="fa-solid fa-pen-to-square"></i>
</button>

<div id="exportModal">
    <div class="modal-content">
        <h3>Simpan Perubahan Permanen</h3>
        <p style="font-size: 13px; color: #666; margin-top: 5px;">Copy seluruh teks di bawah ini, lalu timpa tulisan <br><code>const defaultData = [...]</code> di dalam file <b>index.html</b> Anda di GitHub.</p>
        <textarea id="exportData" readonly></textarea>
        <div class="btn-group">
            <button class="btn" onclick="closeExport()">Tutup</button>
            <button class="btn btn-primary" onclick="copyExport()">Copy Kode</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // DATA DEFAULT (Edit manual di sini jika di GitHub)
    // ==========================================
    const defaultData = [
        {
            id: "emis",
            title: "EMIS",
            icon: "fa-house-chimney",
            links: [
                { name: "EMIS 4.0", url: "https://emis.kemenag.go.id" },
                { name: "SIMPATIKA", url: "https://simpatika.kemenag.go.id" },
                { name: "Login Admin", url: "#" },
                { name: "Login PTK", url: "#" },
                { name: "EMIS GTK (New)", url: "#" }
            ]
        },
        {
            id: "verval",
            title: "VERVAL",
            icon: "fa-square-check",
            links: [
                { name: "SDM Pusdatin", url: "https://sdm.data.kemdikbud.go.id" },
                { name: "PD Data", url: "https://pd.data.kemdikbud.go.id" },
                { name: "Cek NISN", url: "https://nisn.data.kemdikbud.go.id" }
            ]
        },
        {
            id: "ujian",
            title: "UJIAN",
            icon: "fa-pen-to-square",
            links: [
                { name: "PDUM", url: "https://pdum.kemenag.go.id" },
                { name: "ANBK", url: "https://anbk.kemdikbud.go.id" }
            ]
        }
    ];

    // ==========================================
    // SISTEM APLIKASI
    // ==========================================
    let appData = [];
    let isEditMode = false;
    let currentFilter = 'semua';
    let searchQuery = '';

    // Inisialisasi Data
    function init() {
        const savedData = localStorage.getItem('madrasahLinksData');
        if (savedData) {
            appData = JSON.parse(savedData);
        } else {
            appData = JSON.parse(JSON.stringify(defaultData));
        }
        renderApp();
    }

    function renderApp() {
        renderFilters();
        renderContent();
        updateTotalLinks();
    }

    function updateTotalLinks() {
        const total = appData.reduce((sum, cat) => sum + cat.links.length, 0);
        document.getElementById('total-links').innerText = total;
    }

    // Render Tombol Kategori (Pills)
    function renderFilters() {
        const container = document.getElementById('filterContainer');
        container.innerHTML = `<div class="pill ${currentFilter === 'semua' ? 'active' : ''}" onclick="setFilter('semua')">Semua</div>`;
        
        appData.forEach(cat => {
            container.innerHTML += `
                <div class="pill ${currentFilter === cat.id ? 'active' : ''}" onclick="setFilter('${cat.id}')">
                    <i class="fa-solid ${cat.icon}"></i> ${cat.title}
                </div>
            `;
        });
    }

    function setFilter(id) {
        currentFilter = id;
        renderFilters();
        renderContent();
    }

    // Render Daftar Link
    function renderContent() {
        const container = document.getElementById('contentArea');
        container.innerHTML = '';

        let filteredData = appData;

        // Filter Kategori
        if (currentFilter !== 'semua') {
            filteredData = filteredData.filter(cat => cat.id === currentFilter);
        }

        filteredData.forEach((cat, catIndex) => {
            // Filter Pencarian
            const filteredLinks = cat.links.filter(link => 
                link.name.toLowerCase().includes(searchQuery.toLowerCase())
            );

            // Tampilkan kategori jika ada link (atau jika mode edit aktif)
            if (filteredLinks.length > 0 || isEditMode) {
                let html = `
                    <div class="category-section">
                        <div class="category-header">
                            <div class="category-title">
                                <i class="fa-solid ${cat.icon}" style="color: #d97706;"></i> ${cat.title}
                            </div>
                            <div class="link-count">${filteredLinks.length} links</div>
                        </div>
                `;

                filteredLinks.forEach((link, linkIndex) => {
                    // Cari index asli dari link tersebut di data utama untuk fungsi Edit/Delete
                    const realLinkIndex = cat.links.findIndex(l => l.name === link.name && l.url === link.url);

                    html += `
                        <div class="link-card">
                            <div class="link-number">${linkIndex + 1}</div>
                            <div class="link-name" ${isEditMode ? `onclick="editLink(${catIndex}, ${realLinkIndex})" style="cursor:pointer; text-decoration:underline dashed;"` : ''}>
                                ${link.name}
                            </div>
                            
                            <div class="link-actions normal-controls">
                                <a href="${link.url}" target="_blank" style="color: inherit;"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                                <i class="fa-regular fa-copy" onclick="copyToClipboard('${link.url}')" title="Copy Link"></i>
                            </div>

                            <div class="link-actions edit-controls">
                                <i class="fa-solid fa-pen" onclick="editLink(${catIndex}, ${realLinkIndex})" style="color: #3b82f6;" title="Edit"></i>
                                <i class="fa-solid fa-trash" onclick="deleteLink(${catIndex}, ${realLinkIndex})" style="color: #ef4444;" title="Hapus"></i>
                            </div>
                        </div>
                    `;
                });

                html += `
                        <button class="btn-add-link" onclick="addLink(${catIndex})">
                            <i class="fa-solid fa-plus"></i> Tambah Link ke ${cat.title}
                        </button>
                    </div>
                `;
                container.innerHTML += html;
            }
        });
    }

    // Event Pencarian
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderContent();
    });

    // Fitur Copy
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('Link berhasil di-copy!');
        });
    }

    // ==========================================
    // FITUR EDIT / ADMIN
    // ==========================================
    function toggleEditMode() {
        isEditMode = !isEditMode;
        document.body.classList.toggle('edit-mode-active', isEditMode);
        
        const fabIcon = document.querySelector('.admin-fab i');
        if (isEditMode) {
            fabIcon.classList.remove('fa-pen-to-square');
            fabIcon.classList.add('fa-check'); // Ganti ikon jadi centang
            alert("Mode Edit Aktif! \n\n- Klik ikon Pensil untuk mengubah.\n- Klik ikon Tong Sampah untuk menghapus.\n- Klik tombol Tambah Link di bawah kategori.");
        } else {
            fabIcon.classList.remove('fa-check');
            fabIcon.classList.add('fa-pen-to-square');
            // Saat selesai edit, tampilkan modal export untuk update ke GitHub
            showExportModal(); 
        }
        renderContent();
    }

    function addLink(catIndex) {
        const name = prompt("Masukkan Nama Aplikasi:");
        if (!name) return;
        let url = prompt("Masukkan Link URL (awali dengan https://):", "https://");
        if (!url) return;

        appData[catIndex].links.push({ name, url });
        saveData();
    }

    function editLink(catIndex, linkIndex) {
        if(!isEditMode) return;
        const link = appData[catIndex].links[linkIndex];
        
        const newName = prompt("Edit Nama Aplikasi:", link.name);
        if (newName === null) return;
        
        const newUrl = prompt("Edit Link URL:", link.url);
        if (newUrl === null) return;

        appData[catIndex].links[linkIndex] = { name: newName, url: newUrl };
        saveData();
    }

    function deleteLink(catIndex, linkIndex) {
        if (confirm(`Yakin ingin menghapus link "${appData[catIndex].links[linkIndex].name}"?`)) {
            appData[catIndex].links.splice(linkIndex, 1);
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem('madrasahLinksData', JSON.stringify(appData));
        renderApp();
    }

    // Fitur Export (Untuk di-copy paste ke index.html GitHub)
    function showExportModal() {
        const jsonString = JSON.stringify(appData, null, 4);
        const exportText = `const defaultData = ${jsonString};`;
        document.getElementById('exportData').value = exportText;
        document.getElementById('exportModal').style.display = 'flex';
    }

    function closeExport() {
        document.getElementById('exportModal').style.display = 'none';
    }

    function copyExport() {
        const textarea = document.getElementById('exportData');
        textarea.select();
        document.execCommand('copy');
        alert("Kode berhasil disalin! Silakan paste (timpa) kode const defaultData di file index.html Anda di GitHub.");
        closeExport();
    }

    // Jalankan aplikasi pertama kali
    init();

</script>
</body>
</html>
